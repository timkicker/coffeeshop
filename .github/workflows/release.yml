name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitppc:latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build Hardware Release
        run: |
          mkdir -p build
          cd build
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=/opt/devkitpro/wut/share/wut.toolchain.cmake \
            -DBUILD_MODE=hw \
            -DAPP_VERSION=${{ steps.version.outputs.VERSION }}
          make -j$(nproc)

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: CupStore ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: build/wiiu_mod_store.wuhb
          body: |
            ## CupStore ${{ github.ref_name }}

            ### Installation
            1. Copy `wiiu_mod_store.wuhb` to `SD:/wiiu/apps/modstore/`
            2. Create `SD:/wiiu/apps/modstore/config.json` with your repo URLs
            3. Launch via Homebrew Launcher

            ### config.json
            ```json
            {
              "repos": [
                "https://raw.githubusercontent.com/timkicker/modmanager-repo-template/main/repo.json"
              ]
            }
            ```
